name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run secret scan
        run: bash ./scripts/secret-scan.sh --current --history

  build:
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact_suffix: Darwin_arm64
          - goos: darwin
            goarch: amd64
            artifact_suffix: Darwin_x86_64
          - goos: linux
            goarch: arm64
            artifact_suffix: Linux_arm64
          - goos: linux
            goarch: amd64
            artifact_suffix: Linux_x86_64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARTIFACT_SUFFIX: ${{ matrix.artifact_suffix }}
        run: |
          set -euo pipefail
          artifact_name="histprune_${GITHUB_REF_NAME}_${ARTIFACT_SUFFIX}"
          artifact_dir="dist/${artifact_name}"
          mkdir -p "${artifact_dir}"
          GOOS="${GOOS}" GOARCH="${GOARCH}" CGO_ENABLED=0 go build -o "${artifact_dir}/histprune" ./cmd/histprune
          cp README.md README.zh-CN.md README.en.md LICENSE "${artifact_dir}/"
          tar -C "${artifact_dir}" -czf "dist/${artifact_name}.tar.gz" histprune README.md README.zh-CN.md README.en.md LICENSE

      - name: Upload packaged archive
        uses: actions/upload-artifact@v7
        with:
          name: histprune-${{ github.ref_name }}-${{ matrix.artifact_suffix }}
          path: dist/histprune_${{ github.ref_name }}_${{ matrix.artifact_suffix }}.tar.gz
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Flatten downloaded artifacts
        run: |
          set -euo pipefail
          find dist -type f -name '*.tar.gz' -exec mv {} dist/ \;

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum histprune_*.tar.gz > checksums.txt)

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/histprune_*.tar.gz \
              dist/checksums.txt \
              --repo "${GH_REPO}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/histprune_*.tar.gz \
              dist/checksums.txt \
              --repo "${GH_REPO}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
