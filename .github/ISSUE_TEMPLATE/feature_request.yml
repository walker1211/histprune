name: Feature request
description: Suggest an improvement or new capability for histprune
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please avoid including secrets, private shell history, `.env` values, `configs/config.yaml`, local repository paths, backups, logs, or generated local data.

  - type: textarea
    id: scenario
    attributes:
      label: Use case
      description: What are you trying to accomplish? Describe the workflow or problem in practical terms.
      placeholder: "When using histprune to ..., I need ..."
    validations:
      required: true

  - type: textarea
    id: expected-capability
    attributes:
      label: Desired capability
      description: What should histprune be able to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds, existing commands, or other tools have you tried?
    validations:
      required: false

  - type: textarea
    id: constraints
    attributes:
      label: Constraints and compatibility
      description: Mention relevant constraints such as shell history formats, backup behavior, restore safety, security, performance, or platform requirements.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, links, or screenshots if helpful. Redact sensitive information.
    validations:
      required: false
